# amix-z3660net driver.conf
#
# Consumed by ../amix-kerntools/build-net-kernel.sh (NOT the SCSI build-kernel.sh).
# A STREAMS/DLPI network driver does NOT live in sd.c's scsicard[] table -- it is
# wired directly into master.d/kernel.c's cdevsw[] (d_str -> streamtab) and built
# in its own amiga/driver/<dir>/ subtree, so it uses a different build path.
#
# fields:  net  <dir>  <src>  <streamtab-symbol>  <cdevsw-major>  <iface>  "<description>"
#   <dir>        on-box driver subdir:   /usr/sys/amiga/driver/<dir>/
#   <src>        main source file (all *.c and *.h in src/ are pushed)
#   <streamtab>  the `struct streamtab` symbol placed in cdevsw[major].d_str
#   <major>      cdevsw slot (48 is free on the stock/a4091 kernel; verified at build)
#   <iface>      slink/ifconfig interface name (zen0)
#
net  z3660eth  z3660eth.c  z3660ethinfo  48  zen  "Z3660 Ethernet"
